# PDF-Papers AI Agent — backing stores for D2/D3/D4.
# Bring everything up with:  docker compose up -d
#   MongoDB  -> localhost:27017
#   Qdrant   -> http://localhost:6333/dashboard
#   Neo4j    -> http://localhost:7474   (user: neo4j  pass: csai415pass)
services:

  mongodb:
    image: mongo:7
    container_name: csai415_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: csai415
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.9.2
    container_name: csai415_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST / dashboard
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/readyz"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5
    container_name: csai415_neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # HTTP browser
      - "7687:7687"   # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    environment:
      NEO4J_AUTH: neo4j/csai415pass
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_initial__size: 256m
      NEO4J_dbms_memory_heap_max__size:    512m
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "csai415pass", "RETURN 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

volumes:
  mongo_data:
  qdrant_data:
  neo4j_data:
  neo4j_logs:
